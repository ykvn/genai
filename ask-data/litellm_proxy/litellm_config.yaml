model_list:
  - model_name: qwen2.5-3b-instruct                # The exact model identity string CrewAI will call
    litellm_params:
      model: openai/qwen2.5-3b-instruct            # Specifies the OpenAI protocol parsing structure
      
      # 🔌 DYNAMIC ENVIRONMENT BRIDGE
      # Pulls the live Qwen CML Subdomain URL straight from your container environment at boot
      api_base: os.environ/QWEN_APP_URL
      
      api_key: "not-needed-for-local-cpu"